name: CI — Build e Verificação

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  backend:
    name: Backend — Verificação
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: back/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Verificar sintaxe (node --check)
        run: node --check index.js

      - name: Verificar syntaxe de todos os módulos
        run: |
          for f in config/*.js controllers/*.js controllers/**/*.js models/*.js routes/*.js middlewares/*.js crons/*.js; do
            if [ -f "$f" ]; then
              node --check "$f" || echo "AVISO: $f"
            fi
          done

      - name: Testes (se existirem)
        run: npm test || true

  frontend:
    name: Frontend — Build de Produção
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Build de produção
        env:
          VITE_ENV: production
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_DOMAIN: ${{ secrets.VITE_DOMAIN }}
          CI: false
        run: npm run build

      - name: Verificar tamanho do bundle
        run: |
          echo "=== Bundle Size ==="
          du -sh build/
          echo "=== JS Files ==="
          ls -lh build/static/js/ 2>/dev/null || true

      - name: Upload artefato do build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: front/build/
          retention-days: 7
