name: Deploy para GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: front/package-lock.json
      - run: npm ci
        working-directory: front
      - run: npm run build
        working-directory: front
        env:
          VITE_BASE_URL: /teste
          VITE_API_URL: https://minisitio-v2-production.up.railway.app/api
          VITE_DOMAIN: https://minisitio-developer.github.io/teste
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: front/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
